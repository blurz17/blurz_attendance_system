services:
  # ─────────────────────────────────────────────────────────────────────────
  # FastAPI Application
  # ─────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: blurz_api
    restart: unless-stopped
    env_file:
      - ./server/.env.docker
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - blurz_network

  # ─────────────────────────────────────────────────────────────────────────
  # Celery Worker
  # ─────────────────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: blurz_celery_worker
    restart: unless-stopped
    command: ["celery", "-A", "core.services.celery.celery_config", "worker", "--loglevel=info", "--concurrency=2"]
    env_file:
      - ./server/.env.docker
    networks:
      - blurz_network

# ─────────────────────────────────────────────────────────────────────────
# Network
# ─────────────────────────────────────────────────────────────────────────
networks:
  blurz_network:
    driver: bridge
