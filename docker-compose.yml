version: "3.9"

services:
  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: blurz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blurz}
      POSTGRES_DB: ${POSTGRES_DB:-smart-attendance}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-smart-attendance}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blurz_network

  # ─────────────────────────────────────────────────────────────────────────
  # Redis (Broker + Cache)
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: blurz_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blurz_network

  # ─────────────────────────────────────────────────────────────────────────
  # Alembic Migrations (runs once then exits)
  # ─────────────────────────────────────────────────────────────────────────
  migrate:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: blurz_migrate
    command: ["alembic", "upgrade", "head"]
    env_file:
      - ./server/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - blurz_network
    restart: "no"

  # ─────────────────────────────────────────────────────────────────────────
  # FastAPI Application
  # ─────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: blurz_api
    restart: unless-stopped
    env_file:
      - ./server/.env.docker
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - blurz_network

  # ─────────────────────────────────────────────────────────────────────────
  # Celery Worker
  # ─────────────────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: blurz_celery_worker
    restart: unless-stopped
    command: ["celery", "-A", "core.services.celery.celery_config", "worker", "--loglevel=info", "--concurrency=2"]
    env_file:
      - ./server/.env.docker
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - blurz_network

  # ─────────────────────────────────────────────────────────────────────────
  # Celery Beat (Scheduler — uncomment if you use periodic tasks)
  # ─────────────────────────────────────────────────────────────────────────
  # celery_beat:
  #   build:
  #     context: ./server
  #     dockerfile: Dockerfile
  #   container_name: blurz_celery_beat
  #   restart: unless-stopped
  #   command: ["celery", "-A", "core.services.celery.celery_config", "beat", "--loglevel=info"]
  #   env_file:
  #     - ./server/.env.docker
  #   depends_on:
  #     - redis
  #     - postgres
  #   networks:
  #     - blurz_network

  # ─────────────────────────────────────────────────────────────────────────
  # Flower — Celery monitoring UI (optional, remove in strict prod)
  # ─────────────────────────────────────────────────────────────────────────
  flower:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: blurz_flower
    restart: unless-stopped
    command: ["celery", "-A", "core.services.celery.celery_config", "flower", "--port=5555"]
    env_file:
      - ./server/.env.docker
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    networks:
      - blurz_network

# ─────────────────────────────────────────────────────────────────────────
# Named Volumes
# ─────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

# ─────────────────────────────────────────────────────────────────────────
# Network
# ─────────────────────────────────────────────────────────────────────────
networks:
  blurz_network:
    driver: bridge
