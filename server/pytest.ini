[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    asyncio: async test (handled by pytest-asyncio)
    unit: pure unit test, no HTTP/DB
    integration: requires live DB + Redis
